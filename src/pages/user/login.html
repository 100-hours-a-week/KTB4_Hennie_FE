<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
  </head>
  <body>
    <!-- 로그인 본문 -->
    <main class="login-main">
      <section class="login-card">
        <h2 class="login-card__title">로그인</h2>

        <form class="login-form">
          <div class="field">
            <label class="field__label" for="email">이메일</label>
            <input
              class="field__input"
              type="email"
              id="email"
              name="email"
              placeholder="이메일을 입력하세요"
            />
          </div>

          <div class="field">
            <label class="field__label" for="password">비밀번호</label>
            <input
              class="field__input"
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
            />
            <p class="field__helper"></p>
          </div>

          <div class="login-actions">
            <button type="submit" class="btn btn--primary btn--block">
              로그인
            </button>
            <a href="/users/signup" class="btn btn--secondary btn--sm"
              >회원가입</a
            >
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
