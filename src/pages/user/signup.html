<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <body>
    <!-- 회원가입 본문 -->
    <main class="signup-main">
      <section class="signup-card">
        <div class="signup-card__head">
          <h2 class="signup-card__title">회원가입</h2>
          <p class="signup-card__subtitle">
            개발바닥에서 나만의 개발자국을 남겨보세요
          </p>
        </div>

        <form class="signup-form">
          <!-- 프로필 사진 업로드 -->
          <div class="avatar-upload">
            <span class="avatar-upload__label">프로필 사진</span>
            <label class="avatar-upload__box" for="profile-image">
              <span class="avatar-upload__icon">+</span>
              <!-- 이미지 선택 시 아래 img의 src를 채우고 .avatar-upload__icon은 숨김 -->
              <!-- <img class="avatar-upload__preview" src="" alt="프로필 미리보기" /> -->
            </label>
            <input
              class="avatar-upload__input"
              type="file"
              id="profile-image"
              accept="image/*"
            />
            <p class="avatar-upload__helper"></p>
          </div>

          <!-- 플로팅 라벨: input 다음에 label을 두어 :focus/:not(:placeholder-shown)로 라벨을 띄운다 -->
          <!-- 이메일 -->
          <div class="field field--float">
            <input
              class="field__input"
              type="email"
              id="email"
              name="email"
              placeholder=" "
              autocomplete="email"
            />
            <label class="field__label" for="email">이메일</label>
            <p class="field__helper"></p>
          </div>

          <!-- 비밀번호 -->
          <div class="field field--float field--password">
            <input
              class="field__input"
              type="password"
              id="password"
              name="password"
              placeholder=" "
              autocomplete="new-password"
            />
            <label class="field__label" for="password">비밀번호</label>
            <button
              type="button"
              class="field__toggle"
              aria-label="비밀번호 표시"
            >
              표시
            </button>
            <p class="field__helper"></p>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="field field--float field--password">
            <input
              class="field__input"
              type="password"
              id="password-confirm"
              name="password-confirm"
              placeholder=" "
              autocomplete="new-password"
            />
            <label class="field__label" for="password-confirm"
              >비밀번호 확인</label
            >
            <button
              type="button"
              class="field__toggle"
              aria-label="비밀번호 표시"
            >
              표시
            </button>
            <p class="field__helper"></p>
          </div>

          <!-- 닉네임 -->
          <div class="field field--float">
            <input
              class="field__input"
              type="text"
              id="nickname"
              name="nickname"
              placeholder=" "
              autocomplete="nickname"
            />
            <label class="field__label" for="nickname">닉네임</label>
            <p class="field__helper"></p>
          </div>

          <button
            type="submit"
            class="btn btn--primary btn--block signup-submit"
            disabled
          >
            회원가입
          </button>
        </form>

        <div class="signup-divider">또는</div>

        <p class="signup-login">
          이미 개발바닥 회원이세요?
          <a href="/users/login" class="signup-login__link">로그인</a>
        </p>
      </section>
    </main>
  </body>
</html>
