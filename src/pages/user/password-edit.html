<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 수정</title>
  </head>
  <body>
    <!-- 비밀번호 수정 본문 -->
    <main class="password-edit-main">
      <section class="password-edit-card">
        <h2 class="password-edit-card__title">비밀번호 수정</h2>

        <form class="password-edit-form">
          <!-- 비밀번호 -->
          <div class="field">
            <label class="field__label" for="password">비밀번호</label>
            <input
              class="field__input"
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
            />
            <p class="field__helper"></p>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="field">
            <label class="field__label" for="password-confirm"
              >비밀번호 확인</label
            >
            <input
              class="field__input"
              type="password"
              id="password-confirm"
              name="password-confirm"
              placeholder="비밀번호를 한번 더 입력하세요"
            />
            <p class="field__helper"></p>
          </div>

          <button type="button" class="btn btn--primary btn--block">
            수정하기
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
