<!-- 📁 pages/post-detail.html  (라우트 예: /posts/:id) -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글</title>
  </head>
  <body>

    <main class="post-detail-main">
      <!-- 게시글 본문 (postDetailView가 생성) -->
      <div id="postDetail"></div>

      <!-- 댓글 영역 -->
      <section class="post-detail-comments">
        <!-- 통계 (좋아요/댓글/조회수) — postDetailView가 채움 -->
        <div class="post-detail-stats" id="postStats"></div>

        <!-- 댓글 입력 -->
        <form class="comment-form">
          <textarea
            class="comment-form__input"
            placeholder="이 기술에 대한 생각을 개발자국으로 남겨보세요 🐾"
          ></textarea>
          <div class="comment-form__actions">
            <button
              type="button"
              class="btn btn--secondary btn--sm comment-form__cancel"
              id="commentEditCancelBtn"
              hidden
            >
              취소
            </button>
            <button
              type="button"
              class="btn btn--primary btn--sm"
              id="commentSubmitBtn"
            >
              댓글 등록
            </button>
          </div>
        </form>

        <!-- 댓글 목록 (commentView가 생성) -->
        <ul class="comment-list" id="commentList"></ul>
      </section>
    </main>

    <div id="commentModalRoot"></div>

    <div
      class="modal"
      id="postReportModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="postReportModalTitle"
    >
      <div class="modal__box">
        <p class="modal__title" id="postReportModalTitle">
          게시글을 신고하시겠습니까?
        </p>
        <p class="modal__desc">신고 사유를 입력해주세요.</p>
        <textarea
          class="post-report-form__input"
          id="postReportReason"
          maxlength="500"
          placeholder="신고 사유"
        ></textarea>
        <div class="modal__actions">
          <button type="button" class="btn btn--dark" id="postReportCancel">
            취소
          </button>
          <button
            type="button"
            class="btn btn--primary"
            id="postReportConfirm"
          >
            신고
          </button>
        </div>
      </div>
    </div>

    <!-- 삭제 확인 모달 (회원정보수정에서 만든 공통 모달 재사용) -->
    <div
      class="modal"
      id="deleteModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="deleteModalTitle"
    >
      <div class="modal__box">
        <p class="modal__title" id="deleteModalTitle">
          게시글을 삭제하시겠습니까?
        </p>
        <p class="modal__desc">삭제한 내용은 복구할 수 없습니다.</p>
        <div class="modal__actions">
          <button type="button" class="btn btn--dark" id="deleteCancel">
            취소
          </button>
          <button type="button" class="btn btn--primary" id="deleteConfirm">
            확인
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
