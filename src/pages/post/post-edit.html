<!-- 📁 pages/post-edit.html  (라우트 예: /posts/:id/edit) -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 수정</title>
  </head>
  <body>

    <!-- 게시글 수정 본문 -->
    <main class="post-edit-main">
      <section class="post-edit-card">
        <h2 class="post-edit-card__title">게시글 수정</h2>

        <form class="post-edit-form">
          <!-- 제목 (기존 값은 컨트롤러가 채움) -->
          <div class="field">
            <label class="field__label" for="title">제목*</label>
            <input
              class="field__input"
              type="text"
              id="title"
              name="title"
              maxlength="26"
            />
          </div>

          <!-- 내용 (기존 값은 컨트롤러가 채움) -->
          <div class="field">
            <label class="field__label" for="content">내용*</label>
            <textarea
              class="field__textarea"
              id="content"
              name="content"
            ></textarea>
            <p class="field__helper"></p>
          </div>

          <!-- 이미지 -->
          <div class="field">
            <label class="field__label" for="image">이미지</label>
            <div class="field__file">
              <label class="field__file-btn" for="image">파일 선택</label>
              <input
                class="field__file-input"
                type="file"
                id="image"
                name="image"
                accept="image/*"
              />
              <span class="field__file-name">파일을 선택해주세요.</span>
            </div>
          </div>

          <!-- 수정하기 -->
          <button type="submit" class="btn btn--primary btn--block">
            수정하기
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
